<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brusselse Cultuurverkenner</title>
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <div id="app" class="app-container">
      <header class="site-header">
        <div class="header-content">
          <div>
            <h1>Brusselse Cultuurverkenner</h1>
            <p>Ontdek culturele en toeristische plekken in Brussel !</p>
          </div>
        </div>
      </header>

      <main class="main-content">
        <section class="controls glass-panel">
        <form id="searchForm" class="search-group" novalidate>
          <label for="searchInput" class="sr-only">Zoek op naam</label>
          <div class="search-input-wrap">
            <input type="search" id="searchInput" name="search" placeholder="Zoek op naam hier..." maxlength="80" autocomplete="off">
            <span class="search-icon" aria-hidden="true">🔍</span>
          </div>
          <p id="searchError" class="search-error" role="alert" hidden></p>
        </form>

        <div class="filter-group">
          <label for="categoryFilter" class="sr-only">Filter op categorie</label>
          <select id="categoryFilter">
            <option value="all">Alle categorieën</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="gemeenteFilter" class="sr-only">Filter op gemeente</label>
          <select id="gemeenteFilter">
            <option value="all">Alle gemeenten</option>
          </select>
          </div>


          <div class="filter-group">
          <label for="sortSelect" class="sr-only">Sorteer</label>
          <select id="sortSelect">
            <option value="name-asc">Naam (A-Z)</option>
            <option value="name-desc">Naam (Z-A)</option>
            <option value="category-asc">Ctegorie (A-Z)</option>
          </select>
        </div>
        </section>

        <div class="content-layout">
        <section class="results-section">
          <div class="results-header">
            <h2 id="resultsInfo">0 resultaten gevonden</h2>
          </div>
          <div id="loadingIndicator" class="loading-indicator">Laden...</div>
          <div id="venueList" class="venue-grid"></div>
        </section>

        <aside class="sidebar glass-panel">
          <h2>Mijn Favorieten</h2>
          <div id="favoritesList" class="favorites-container">
            <p class="empty-favorites">Je hebt nog geen favorieten toegevoegd.</p>
          </div>
        </aside>
          </div>
      </main>

    </div>
     <!-- JS inject -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
